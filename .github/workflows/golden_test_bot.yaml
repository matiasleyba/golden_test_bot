name: Golden Test Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  golden-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash

      - name: Get dependencies
        run: flutter pub get

      - name: Set up Git
        run: |
          git config user.name "golden-tests-bot"
          git config user.email "golden-tests-bot@users.noreply.github.com"

      - name: Generate golden images
        run: |
          # Run golden tests to generate/update golden images
          flutter test --update-goldens --run-skipped

      - name: Detect golden changes
        id: detect
        run: |
          # Path to your test folder (checking all golden files)
          TEST_PATH="test"

          # Base and head commits
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Checking for golden changes..."
          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"
          echo "Test path: $TEST_PATH"

          # Detect changes in test folder (focusing on .png files which are golden files)
          git fetch origin $BASE_SHA
          git add $TEST_PATH
          git diff --name-status $HEAD_SHA -- $TEST_PATH > golden_changes.txt || echo "No changes found or error occurred"
          
          echo "=== Golden changes detected ==="
          cat golden_changes.txt || echo "No golden_changes.txt file found"
          echo "================================"

          echo "changes<<EOF" >> $GITHUB_OUTPUT
          cat golden_changes.txt >> $GITHUB_OUTPUT 2>/dev/null || echo "No changes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse golden changes
        id: parse
        run: |
          echo "=== Parsing golden changes ==="
          
          # Filter for .png files which are golden files
          ADDED=$(grep "^A.*\.png$" golden_changes.txt 2>/dev/null | wc -l || echo "0")
          MODIFIED=$(grep "^M.*\.png$" golden_changes.txt 2>/dev/null | wc -l || echo "0")
          REMOVED=$(grep "^D.*\.png$" golden_changes.txt 2>/dev/null | wc -l || echo "0")

          echo "Added: $ADDED"
          echo "Modified: $MODIFIED"
          echo "Removed: $REMOVED"

          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "removed=$REMOVED" >> $GITHUB_OUTPUT

      - name: Create golden branch
        id: create_golden_branch
        if: steps.parse.outputs.added != '0' || steps.parse.outputs.modified != '0' || steps.parse.outputs.removed != '0'
        run: |
          echo "Creating golden branch..."
          PR_NUMBER=${{ github.event.pull_request.number }}
          GOLDEN_BRANCH="golden-updates/$PR_NUMBER"

          echo "Branch name: $GOLDEN_BRANCH"
          echo "PR number: $PR_NUMBER"

          git checkout -b $GOLDEN_BRANCH
          
          echo "Finding .png files in test directory..."
          find test -name "*.png" -exec echo "Found: {}" \;
          find test -name "*.png" -exec git add {} \; || echo "No .png files found or error occurred"
          
          echo "Committing changes..."
          COMMIT_MESSAGE="chore: Update golden files for PR #$PR_NUMBER"
          git commit -m "$COMMIT_MESSAGE" || echo "No changes to commit"
          
          echo "Pushing branch..."
          git push origin $GOLDEN_BRANCH --force

          echo "golden_branch=$GOLDEN_BRANCH" >> $GITHUB_ENV
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT

      - name: Find previous comment
        id: find_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'golden-tests-bot'
          body-includes: '<!-- golden-test-bot-comment -->'

      - name: Create or update comment
        if: steps.parse.outputs.added != '0' || steps.parse.outputs.modified != '0' || steps.parse.outputs.removed != '0'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- golden-test-bot-comment -->
            🟡 **Golden test update detected!**

            **I have detected golden test differences and have automatically generated updated golden files for you.**

            If the visual changes in your PR are intentional, you can use the updated golden files to fix the failing tests.

            **To update your golden files:**
            1. Review the changes: 👉 [Compare golden files](https://github.com/${{ github.repository }}/compare/${{ github.event.pull_request.head.ref }}...${{ env.golden_branch }})
            2. If the changes look correct, create the PR and merge the golden branch into your PR branch to fix the tests.

            I'll keep an eye on the PR and will create or modify the goldens if there are any new changes.

          edit-mode: replace

